server {
    listen 80;
    server_name minting.digitaldimension.com.mx;

    root /www/wwwroot/minting.digitaldimension.com.mx/frontend/dist;
    index index.html;

    # In aaPanel, enable HTTPS/SSL and Let's Encrypt separately.
    # This serves the Vite-built SPA and proxies NFT upload calls to the local Node backend.

    location /api/ {
        proxy_pass http://127.0.0.1:64006/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 12m;
    }

    location /health {
        proxy_pass http://127.0.0.1:64006/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
